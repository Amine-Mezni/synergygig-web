security:
    password_hashers:
        App\Entity\Users:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/project-owner, roles: ROLE_HR }
        - { path: ^/gig-worker, roles: ROLE_GIG_WORKER }
        - { path: ^/offers, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            App\Entity\Users:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10