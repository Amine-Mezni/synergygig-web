services:
  # Symfony PHP-FPM service
  php:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: synergygig_php
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/docker-php-config.ini
    ports:
      - "8000:8000"
    networks:
      - synergygig_network
    depends_on:
      - redis
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - DATABASE_URL=mysql://synergygig:synergygig_pass@mysql:3306/finale_synergygig
      - REDIS_URL=redis://redis:6379

  redis:
    image: redis:7-alpine
    container_name: synergygig_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - synergygig_network
    volumes:
      - synergygig_redis_data:/data

  nginx:
    image: nginx:alpine
    container_name: synergygig_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - synergygig_network
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: synergygig_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "root_change_me"
      MYSQL_DATABASE: "finale_synergygig"
      MYSQL_USER: "seji"
      MYSQL_PASSWORD: "synergygig_pass"
    ports:
      - "3306:3306"
    volumes:
      - synergygig_mysql_data:/var/lib/mysql
    networks:
      - synergygig_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: synergygig_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: seji
      PMA_PASSWORD: "synergygig_pass"
      UPLOAD_LIMIT: 300M
    networks:
      - synergygig_network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: synergygig_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.benzaitsue.work.gd
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://n8n.benzaitsue.work.gd/
      - GENERIC_TIMEZONE=Africa/Tunis
      - N8N_SECURE_COOKIE=false
    networks:
      - synergygig_network
    volumes:
      - n8n_n8n_data:/home/node/.n8n

volumes:
  n8n_n8n_data:
    external: true

  synergygig_redis_data:
    driver: local
  synergygig_mysql_data:
    driver: local

networks:
  synergygig_network:
    driver: bridge
