version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_synergygig_php
    env_file: .env
    ports:
      - "9000:9000"
    volumes:
      - .:/app
    depends_on:
      - nginx
    networks:
      - web_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: web_synergygig_nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/app:ro
    depends_on:
      - php
    networks:
      - web_network
    restart: unless-stopped

networks:
  web_network:
    driver: bridge
